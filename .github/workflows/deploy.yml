# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:      # PRはビルド・テストのみ

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Flutter web (Docker)
        run: |
          docker build \
            --build-arg BASE_HREF="/${{ github.event.repository.name }}/" \
            -t my-app .
          
          # コンテナからビルド成果物だけ取り出す
          docker create --name tmp-container my-app
          mkdir -p ./output
          docker cp tmp-container:/usr/share/nginx/html/. ./output/
          docker rm tmp-container

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4